services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./docker/ssl:/etc/caddy/ssl:ro
      - ./docker/logs:/var/log/caddy
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - site
    networks:
      - default
      - bcai-net
    restart: unless-stopped

  site:
    build: .
    expose:
      - "8080"
    env_file:
      - .env
    restart: unless-stopped

networks:
  bcai-net:
    external: true

volumes:
  caddy_data:
  caddy_config:
